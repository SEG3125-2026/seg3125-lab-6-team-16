<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 6 Survey - Elite Cuts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Lab 6 Survey</a>
      <span class="navbar-text text-white-50">Participant View</span>
    </div>
  </nav>

  <main class="container my-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h3 mb-3">Elite Cuts Experience Survey</h1>
            <p class="text-muted">
              Help us improve your experience. This survey has three short steps, with 1–2 questions per page.
            </p>

            <!-- Progress indicator -->
            <div class="d-flex align-items-center mb-4" aria-label="Survey progress">
              <div class="me-2 fw-semibold">Step <span id="step-number">1</span> of 3</div>
              <div class="progress flex-grow-1">
                <div id="step-progress" class="progress-bar" role="progressbar" style="width: 33%;"></div>
              </div>
            </div>

            <form id="survey-form" novalidate>
              <!-- Step 1: basic info (2 questions) -->
              <section class="survey-step" data-step="1">
                <div class="mb-3">
                  <label for="name" class="form-label">Your name <span class="text-danger">*</span></label>
                  <input type="text" id="name" class="form-control" required />
                  <div class="invalid-feedback">Please enter your name.</div>
                </div>
                <div class="mb-3">
                  <label for="ageRange" class="form-label">Age range</label>
                  <select id="ageRange" class="form-select">
                    <option value="">Prefer not to say</option>
                    <option value="18-24">18–24</option>
                    <option value="25-34">25–34</option>
                    <option value="35-44">35–44</option>
                    <option value="45+">45+</option>
                  </select>
                </div>
              </section>

              <!-- Step 2: satisfaction (2 questions) -->
              <section class="survey-step d-none" data-step="2">
                <div class="mb-3">
                  <label class="form-label">Overall satisfaction with Elite Cuts <span class="text-danger">*</span></label>
                  <div class="rating-options">
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="satisfaction" id="sat1" value="1" required />
                      <label class="form-check-label" for="sat1">1</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="satisfaction" id="sat2" value="2" />
                      <label class="form-check-label" for="sat2">2</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="satisfaction" id="sat3" value="3" />
                      <label class="form-check-label" for="sat3">3</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="satisfaction" id="sat4" value="4" />
                      <label class="form-check-label" for="sat4">4</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="radio" name="satisfaction" id="sat5" value="5" />
                      <label class="form-check-label" for="sat5">5</label>
                    </div>
                  </div>
                  <div class="invalid-feedback d-block d-none" id="satisfaction-error">Please select a rating.</div>
                </div>
                <div class="mb-3">
                  <label class="form-label">Which services have you used? (choose all that apply)</label>
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="svc-haircut" value="Haircut" />
                        <label class="form-check-label" for="svc-haircut">Haircut</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="svc-color" value="Color" />
                        <label class="form-check-label" for="svc-color">Color</label>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="svc-beard" value="Beard Trim" />
                        <label class="form-check-label" for="svc-beard">Beard Trim</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="svc-style" value="Wash & Style" />
                        <label class="form-check-label" for="svc-style">Wash & Style</label>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <!-- Step 3: open feedback (2 questions) -->
              <section class="survey-step d-none" data-step="3">
                <div class="mb-3">
                  <label for="improvement" class="form-label">What is one thing we could improve?</label>
                  <textarea id="improvement" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                  <label for="recommend" class="form-label">Would you recommend Elite Cuts to a friend?</label>
                  <select id="recommend" class="form-select">
                    <option value="">Choose one</option>
                    <option value="Definitely">Definitely</option>
                    <option value="Maybe">Maybe</option>
                    <option value="Unlikely">Unlikely</option>
                  </select>
                </div>
              </section>

              <div class="d-flex justify-content-between mt-4">
                <button type="button" id="prev-step" class="btn btn-outline-secondary" disabled>Back</button>
                <div>
                  <span id="submit-spinner" class="spinner-border spinner-border-sm text-primary me-2 d-none"></span>
                  <button type="button" id="next-step" class="btn btn-primary">Next</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/survey.js"></script>
</body>
</html>
